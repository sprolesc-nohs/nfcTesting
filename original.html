<!DOCTYPE html>
<!-------------------------------------------------------------------------------------------------------------------------------------------------------->
<!-- HTML (the blue <> bits)-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Tag Tracker</title>
  <style>
    /* CSS */
    body {
      font-family: monospace, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 400px;
    }
    th, td {
      border: 1px solid #9cb37e;
      padding: 10px 16px;
      text-align: left;
    }
    th {
      background-color: #c7bb6f;
    }
  </style>
</head>
<body>
  <h1>NFC Tag Tracker</h1>
  <table>
    <thead>
      <tr>
        <th>Location</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Point A</td>
        <td id="point-a-date"></td>
        <td id="point-a-time"></td>
      </tr>
      <tr>
        <td>Point B</td>
        <td id="point-b-date"></td>
        <td id="point-b-time"></td>
      </tr>
    </tbody>
  </table>

  <p id="nfc-status">Press the button, then scan a tag.</p>
  <button onclick="startNFC()">Approach the Tag</button>

  <script>
    // JavaScript

    /**
     * Returns the current time as a string in the format "HH:MM:SS".
     * @return String
     */
    function getTime() {
      return new Date().toLocaleTimeString();
    }

    /**
     * Returns the current date as a string in the format "MM/DD/YYYY".
     * @return String
     */
    function getDate() {
      return new Date().toLocaleDateString();
    }


    function updatePoint(pointID) {
      document.getElementById(pointID + '-date').textContent = getDate();
      document.getElementById(pointID + '-time').textContent = getTime();
    }

    async function startNFC() {
      try {
        // Check if the Web NFC API is supported
        const reader = new NDEFReader();
        // Start scanning for NFC tags
        await reader.scan();
        // Update the status to indicate that NFC is ready
        document.getElementById('nfc-status').textContent = 'NFC ready — scan a tag';
        
        // Listen for NFC tag readings
        reader.addEventListener('reading', ({ message }) => {
            // Loop through all records in the NFC message
            // records is an array of NDEFRecord objects, which represent the data read from the NFC tag
            for (const record of message.records) {
                // Initialize an empty string to hold the decoded text from the NFC tag    
                let text = '';
                // Check the type of the record and decode it accordingly
                if (record.recordType === 'text') {
                    // If the record is of type 'text', decode it using the specified encoding (defaulting to 'utf-8')
                    text = new TextDecoder(record.encoding || 'utf-8').decode(record.data);
                } else {
                    // For other record types, decode using the default encoding
                    text = new TextDecoder().decode(record.data);
                }
                // Trim any leading or trailing whitespace from the decoded text
                text = text.trim();
                // Update the status to show the last scanned text
                document.getElementById('nfc-status').textContent = 'Last scan: "' + text + '"';
                // Update the appropriate point based on the scanned text
                updatePoint(text);
          }
        });
        // Listen for errors during NFC reading
        reader.addEventListener('readingerror', () => {
            // If there's an error reading the NFC tag, update the status to indicate the error
          document.getElementById('nfc-status').textContent = 'Error reading tag — try again';
        });
      } catch (error) {
        // If there's an error initializing the NFC reader, update the status to show the error message
        document.getElementById('nfc-status').textContent = 'NFC error: ' + error;
      }
    }
  </script>
</body>
</html>
