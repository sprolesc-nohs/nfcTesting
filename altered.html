<!DOCTYPE html>
<!-------------------------------------------------------------------------------------------------------------------------------------------------------->
<!-- HTML (the blue <> bits)-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Tag Tracker</title>
  <style>
    /* CSS */
    body {
      font-family: monospace, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 400px;
    }
    th, td {
      border: 1px solid #9cb37e;
      padding: 10px 16px;
      text-align: left;
    }
    th {
      background-color: #88c76f;
    }
  </style>
</head>
<body>
  <h1>NFC Tag Tracker</h1>
  <table>
    <thead>
      <tr>
        <th>Location</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Point A</td>
        <td id="point-a-date"></td>
        <td id="point-a-time"></td>
      </tr>
      <tr>
        <td>Point B</td>
        <td id="point-b-date"></td>
        <td id="point-b-time"></td>
      </tr>
    </tbody>
  </table>

  <p id="nfc-status">Waiting for NFC tag scan...</p>

  <script>
    // JavaScript — NFC is handled by the Android Java layer (reader.java).
    // Java calls onTagScanned(text) and onStatus(text) via the WebView bridge.

    /**
     * Returns the current time as a string in the format "HH:MM:SS".
     */
    function getTime() {
      return new Date().toLocaleTimeString();
    }

    /**
     * Returns the current date as a string in the format "MM/DD/YYYY".
     */
    function getDate() {
      return new Date().toLocaleDateString();
    }

    /**
     * Updates the date and time for a given point ID in the HTML table.
     * @param {string} pointID - "point-a" or "point-b"
     */
    function updatePoint(pointID) {
      document.getElementById(pointID + '-date').textContent = getDate();
      document.getElementById(pointID + '-time').textContent = getTime();
    }

    /**
     * Called by Java (reader.java) when an NFC tag is scanned.
     * @param {string} text - the text read from the tag (e.g. "point-a")
     */
    function onTagScanned(text) {
      document.getElementById('nfc-status').textContent = 'Last scan: "' + text + '"';
      updatePoint(text);
    }

    /**
     * Called by Java (reader.java) to show status or error messages.
     * @param {string} msg - status message
     */
    function onStatus(msg) {
      document.getElementById('nfc-status').textContent = msg;
    }
  </script>
</body>
</html>
