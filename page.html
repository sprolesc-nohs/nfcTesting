<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NFC Tag Tracker</title>
  <style>
    body {
      font-family: monospace, sans-serif;
      padding: 20px;
    }
    table {
      border-collapse: collapse;
      width: 400px;
    }
    th, td {
      border: 1px solid #9cb37e;
      padding: 10px 16px;
      text-align: left;
    }
    th {
      background-color: #8fa873;
    }
  </style>
</head>
<body>
  <h1>NFC Tag Tracker</h1>
  <table>
    <thead>
      <tr>
        <th>Location</th>
        <th>Date</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>Point A</td>
        <td id="point-a-date"></td>
        <td id="point-a-time"></td>
      </tr>
      <tr>
        <td>Point B</td>
        <td id="point-b-date"></td>
        <td id="point-b-time"></td>
      </tr>
    </tbody>
  </table>

  <p id="nfc-status">Press the button, then scan a tag.</p>
  <p id="folder-status">Logs folder not selected.</p>
  <button onclick="startNFC()">Approach the Tag</button>

  <script>
    let logsDirectoryHandle = null;

    function getTime() {
      return new Date().toLocaleTimeString();
    }
    function getDate() {
      return new Date().toLocaleDateString();
    }

    async function ensureLogsDirectory() {
      if (!window.showDirectoryPicker) {
        throw new Error('This browser does not support folder writing. Use Chrome or Edge.');
      }

      if (!logsDirectoryHandle) {
        logsDirectoryHandle = await window.showDirectoryPicker();
        document.getElementById('folder-status').textContent = 'Logs folder selected: ' + logsDirectoryHandle.name;
      }

      const permission = await logsDirectoryHandle.requestPermission({ mode: 'readwrite' });
      if (permission !== 'granted') {
        throw new Error('Write permission to the logs folder was not granted.');
      }

      return logsDirectoryHandle;
    }

    async function appendLogEntry(pointID, date, time) {
      const directoryHandle = await ensureLogsDirectory();
      const fileHandle = await directoryHandle.getFileHandle(pointID + '.txt', { create: true });
      const existingFile = await fileHandle.getFile();
      const writable = await fileHandle.createWritable({ keepExistingData: true });
      const logLine = pointID + ' scanned at ' + date + ' ' + time + '\n';

      await writable.seek(existingFile.size);
      await writable.write(logLine);
      await writable.close();
    }

    async function updatePoint(pointID) {
      const date = getDate();
      const time = getTime();

      document.getElementById(pointID + '-date').textContent = date;
      document.getElementById(pointID + '-time').textContent = time;

      await appendLogEntry(pointID, date, time);
    }

    async function startNFC() {
      try {
        await ensureLogsDirectory();
        const reader = new NDEFReader();
        await reader.scan();
        document.getElementById('nfc-status').textContent = 'NFC ready — scan a tag';
        reader.addEventListener('reading', ({ message }) => {
          for (const record of message.records) {
            let text = '';
            if (record.recordType === 'text') {
              text = new TextDecoder(record.encoding || 'utf-8').decode(record.data);
            } else {
              text = new TextDecoder().decode(record.data);
            }
            text = text.trim();
            document.getElementById('nfc-status').textContent = 'Last scan: "' + text + '"';

            if (text === 'point-a') {
              updatePoint('point-a').catch(error => {
                document.getElementById('nfc-status').textContent = 'Log write error: ' + error.message;
              });
            } else if (text === 'point-b') {
              updatePoint('point-b').catch(error => {
                document.getElementById('nfc-status').textContent = 'Log write error: ' + error.message;
              });
            }
          }
        });
        reader.addEventListener('readingerror', () => {
          document.getElementById('nfc-status').textContent = 'Error reading tag — try again';
        });
      } catch (error) {
        document.getElementById('nfc-status').textContent = 'NFC error: ' + error;
      }
    }
  </script>
</body>
</html>
